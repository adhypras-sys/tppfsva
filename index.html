<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Data TPP untuk FSVA</title>
    
    <!-- Tailwind CSS untuk Styling Modern & Responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfigurasi Tailwind untuk Dark Mode & Glassmorphism -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.1)',
                        glassBorder: 'rgba(255, 255, 255, 0.15)',
                        glassDark: 'rgba(11, 17, 32, 0.65)',
                        glassLight: 'rgba(255, 255, 255, 0.75)',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- HTM (Hyperscript Tagged Markup) untuk menulis React tanpa Babel -->
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PapaParse untuk membaca Google Sheet sebagai CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Chart.js untuk visualisasi grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- LZ-String untuk Kompresi URL Hash -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    
    <!-- QRious untuk Generate QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        /* Transisi Global Mulus & Proteksi Sentuhan Ganda */
        body {
            transition: background-color 0.6s cubic-bezier(0.16, 1, 0.3, 1), color 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* TEMA TERANG (Default Modern Style) */
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(224, 231, 255, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(209, 250, 229, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
            color: #0f172a;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.02);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* TEMA GELAP (Cyberpunk Aurora Mesh) */
        .dark body {
            background-color: #060913;
            background-image: 
                radial-gradient(at 0% 0%, rgba(67, 56, 202, 0.18) 0px, transparent 40%), 
                radial-gradient(at 50% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 45%), 
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 40%);
            background-attachment: fixed;
            color: #f8fafc;
        }
        
        .dark .glass-panel {
            background: rgba(11, 18, 36, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 15px 35px -15px rgba(0, 0, 0, 0.6), 0 1px 3px rgba(255, 255, 255, 0.02);
        }

        /* Kustomisasi Scrollbar Minimalis & Touch Scroll untuk Mobile */
        .touch-scroll {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.25); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }

        /* --- ANIMASI BARU (MANTAP, HALUS, RAPI) --- */
        .animate-fade-in-up {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(25px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .dropdown-menu {
            animation: dropdownBounce 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: top;
        }

        @keyframes dropdownBounce {
            0% { opacity: 0; transform: scaleY(0.9) translateY(-10px); }
            100% { opacity: 1; transform: scaleY(1) translateY(0); }
        }

        .slide-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-text { animation: pulseText 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulseText {
            0%, 100% { opacity: 0.7; filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0)); }
            50% { opacity: 1; filter: drop-shadow(0 0 12px rgba(99, 102, 241, 0.5)); }
        }

        /* Animasi Ring Spinner */
        .spinner-ring { position: relative; width: 54px; height: 54px; }
        .spinner-ring div {
            box-sizing: border-box; display: block; position: absolute;
            width: 100%; height: 100%; border: 4px solid transparent; border-radius: 50%;
            animation: ringRotate 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .spinner-ring div:nth-child(1) { border-top-color: #6366f1; animation-delay: -0.45s; }
        .spinner-ring div:nth-child(2) { border-top-color: #10b981; animation-delay: -0.3s; }
        .spinner-ring div:nth-child(3) { border-top-color: #8b5cf6; animation-delay: -0.15s; }

        @keyframes ringRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Skrip JavaScript Standar (Bukan text/babel) -->
    <script type="text/javascript">
        // Inisialisasi HTM yang diikat ke React.createElement
        const html = htm.bind(React.createElement);
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 0. FUNGSI UTILITAS FORMAT TEKS & ANGKA ---
        const toTitleCase = (str) => {
            try {
                if (!str || typeof str !== 'string') return '';
                let result = str.toLowerCase().split(/\s+/).map(word => {
                    if (word.length === 0) return '';
                    return word.charAt(0).toUpperCase() + word.slice(1);
                }).join(' ');
                
                result = result.replace(/\bDki\b/g, 'DKI');
                result = result.replace(/\bDi Yogyakarta\b/g, 'DI Yogyakarta');
                return result;
            } catch (err) {
                console.error("Error in toTitleCase:", err);
                return String(str) || '';
            }
        };

        const formatSyncTimeStr = () => {
            try {
                const now = new Date();
                const raw = now.toLocaleString('id-ID', { dateStyle: 'full', timeStyle: 'long' });
                const formatted = raw.split(' ').map(word => {
                    if (!word) return '';
                    if (word === word.toUpperCase() && word.match(/[A-Z]/)) return word; 
                    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                }).join(' ');
                return formatted;
            } catch (e) {
                return new Date().toLocaleString();
            }
        };

        const formatIntegerID = (num) => {
            try {
                if (num === undefined || num === null || isNaN(num) || !Number.isFinite(Number(num))) return '0';
                return new Intl.NumberFormat('id-ID', { maximumFractionDigits: 0 }).format(num);
            } catch (err) {
                return String(num || 0);
            }
        };

        const formatDecimalID = (num, maxDecimals = 2) => {
            try {
                if (num === undefined || num === null || isNaN(num) || !Number.isFinite(Number(num))) return '0';
                return new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: maxDecimals }).format(num);
            } catch (err) {
                let formatted = Number(num || 0).toFixed(maxDecimals);
                if (formatted.indexOf('.') !== -1) formatted = formatted.replace(/\.?0+$/, '');
                return formatted.replace('.', ',');
            }
        };

        const safePct = (val, tot) => {
            try {
                if (!tot || tot <= 0) return 0;
                const res = (val / tot) * 100;
                return Number.isFinite(res) ? res : 0;
            } catch(e) { return 0; }
        };

        // --- 0b. KOMPONEN ANIMASI ANGKA ---
        const AnimatedNumber = ({ value, isDecimal = false, maxDecimals = 2 }) => {
            const safeValue = (v) => (v === undefined || v === null || isNaN(Number(v)) || !Number.isFinite(Number(v))) ? 0 : Number(v);
            const [displayValue, setDisplayValue] = useState(safeValue(value));
            const displayValueRef = useRef(safeValue(value));
            const rafIdRef = useRef(null);

            useEffect(() => {
                const targetValue = safeValue(value);

                if (rafIdRef.current !== null) {
                    try { window.cancelAnimationFrame(rafIdRef.current); } catch(e) {}
                    rafIdRef.current = null;
                }

                const startValue = displayValueRef.current;

                if (startValue === targetValue) {
                    setDisplayValue(targetValue);
                    return;
                }

                let startTimestamp = null;
                const duration = 700; 

                const easeOutQuart = (x) => 1 - Math.pow(1 - Math.min(Math.max(x, 0), 1), 4);

                const step = (timestamp) => {
                    try {
                        if (startTimestamp === null) startTimestamp = timestamp;
                        const elapsed = timestamp - startTimestamp;
                        const progress = Math.min(elapsed / duration, 1);
                        const currentVal = startValue + (targetValue - startValue) * easeOutQuart(progress);

                        displayValueRef.current = currentVal;
                        setDisplayValue(currentVal);

                        if (progress < 1) {
                            rafIdRef.current = window.requestAnimationFrame(step);
                        } else {
                            displayValueRef.current = targetValue;
                            setDisplayValue(targetValue);
                            rafIdRef.current = null;
                        }
                    } catch(e) {
                        displayValueRef.current = targetValue;
                        setDisplayValue(targetValue);
                        rafIdRef.current = null;
                    }
                };

                rafIdRef.current = window.requestAnimationFrame(step);

                return () => {
                    if (rafIdRef.current !== null) {
                        try { window.cancelAnimationFrame(rafIdRef.current); } catch(e) {}
                        rafIdRef.current = null;
                    }
                };
            }, [value]);

            try {
                if (isDecimal) {
                    return html`<span>${formatDecimalID(displayValue, maxDecimals)}</span>`;
                }
                return html`<span>${formatIntegerID(Math.round(displayValue))}</span>`;
            } catch (err) {
                return html`<span>${isDecimal ? formatDecimalID(value, maxDecimals) : formatIntegerID(value)}</span>`;
            }
        };

        // --- 1. KOMPONEN UI KUSTOM & GLOBAL ---
        const Icon = ({ name, className }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                try {
                    if (window.lucide && containerRef.current) {
                        containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        window.lucide.createIcons({
                            nameAttr: 'data-lucide',
                            attrs: { class: className },
                            root: containerRef.current
                        });
                    }
                } catch (err) { console.error(err); }
            }, [name, className]);
            return html`<span ref=${containerRef} style=${{ display: 'contents' }}></span>`;
        };

        // Komponen Kartu QR Code di Pojok Kanan Bawah
        const ShareCard = ({ isOpen, onClose, url, showToast }) => {
            const [qrSrc, setQrSrc] = useState("");

            useEffect(() => {
                try {
                    if (isOpen && window.QRious && url) {
                        // Menggunakan metode toDataURL() memastikan QR digenerate sebagai file statis
                        // mengatasi isu render timing pada elemen canvas React
                        const qr = new QRious({
                            value: url,
                            size: 250,
                            level: 'H',
                            backgroundAlpha: 1,
                            backgroundColor: '#ffffff',
                            foreground: '#0f172a'
                        });
                        setQrSrc(qr.toDataURL());
                    }
                } catch(e) { console.error("Error saat merender QR Code:", e); }
            }, [isOpen, url]);

            if (!isOpen) return null;

            return html`
                <div className="fixed bottom-4 right-4 sm:bottom-8 sm:right-8 z-[100] w-[calc(100vw-2rem)] sm:w-[340px] bg-white/95 dark:bg-slate-900/95 backdrop-blur-2xl rounded-[2rem] p-6 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.3)] dark:shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6)] border border-slate-200/80 dark:border-slate-700/80 animate-fade-in-up flex flex-col group">
                    <button onClick=${onClose} className="absolute top-4 right-4 p-2 rounded-full bg-slate-100/80 hover:bg-slate-200 dark:bg-slate-800/80 dark:hover:bg-slate-700 text-slate-500 transition-colors z-10">
                        <${Icon} name="x" className="w-4 h-4" />
                    </button>
                    
                    <div className="flex items-center gap-3 mb-4">
                        <div className="w-10 h-10 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-xl flex items-center justify-center shrink-0">
                            <${Icon} name="share-2" className="w-5 h-5" />
                        </div>
                        <div>
                            <h3 className="text-base font-extrabold text-slate-800 dark:text-white leading-tight">Bagikan Tampilan</h3>
                            <p className="text-xs text-slate-500 dark:text-slate-400 font-medium mt-0.5">Pindai QR atau salin tautan.</p>
                        </div>
                    </div>
                    
                    <div className="bg-white p-3 rounded-2xl shadow-inner border border-slate-200 mb-5 flex items-center justify-center aspect-square relative overflow-hidden group-hover:border-indigo-200 transition-colors duration-300">
                        ${qrSrc 
                            ? html`<img src=${qrSrc} alt="QR Code Bagikan Tampilan" className="w-full h-full object-contain rounded-xl" />` 
                            : html`<div className="w-full h-full flex items-center justify-center text-slate-300"><${Icon} name="loader" className="w-8 h-8 animate-spin" /></div>`
                        }
                    </div>
                    
                    <div className="w-full flex items-center gap-2 relative">
                        <input 
                            type="text" 
                            readOnly 
                            value=${url} 
                            className="w-full bg-slate-50 dark:bg-slate-950/50 text-slate-600 dark:text-slate-300 text-xs py-3 pl-4 pr-10 rounded-xl border border-slate-200 dark:border-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all" 
                        />
                        <button 
                            onClick=${() => {
                                try {
                                    navigator.clipboard.writeText(url).then(() => {
                                        showToast("Tautan berhasil disalin!");
                                    }).catch(() => {
                                        const textArea = document.createElement("textarea");
                                        textArea.value = url;
                                        document.body.appendChild(textArea);
                                        textArea.select();
                                        document.execCommand('copy');
                                        document.body.removeChild(textArea);
                                        showToast("Tautan disalin! (Metode standar)");
                                    });
                                } catch(e) {}
                            }}
                            className="absolute right-1.5 top-1/2 -translate-y-1/2 p-2 text-indigo-600 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 rounded-lg transition-colors"
                            title="Salin Tautan"
                        >
                            <${Icon} name="copy" className="w-4 h-4" />
                        </button>
                    </div>
                </div>
            `;
        };

        // Komponen Header Seragam untuk 5 Bagian Utama (Dilengkapi fitur Toggle/Collapsible)
        const SectionHeader = ({ title, iconName, badgeText, isCollapsed, onToggle }) => {
            return html`
                <div 
                    className="flex flex-col sm:flex-row justify-between items-start sm:items-center w-full cursor-pointer group pb-4 border-b border-transparent hover:border-indigo-500/10 transition-colors"
                    onClick=${onToggle}
                    title=${isCollapsed ? "Tampilkan Bagian Ini" : "Sembunyikan Bagian Ini"}
                >
                    <div className="flex items-center gap-3 w-full sm:w-auto">
                        <span className="p-2 sm:p-2.5 rounded-xl bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 flex items-center justify-center shrink-0 shadow-inner group-hover:bg-indigo-500/20 group-hover:scale-105 transition-all duration-300">
                            <${Icon} name=${iconName} className="w-5 h-5 sm:w-6 sm:h-6" />
                        </span>
                        <h2 className="text-xl sm:text-2xl font-extrabold text-slate-800 dark:text-white tracking-tight truncate select-none">
                            ${title}
                        </h2>
                    </div>
                    <div className="flex items-center gap-3 w-full sm:w-auto mt-3 sm:mt-0 justify-between sm:justify-end pl-1 sm:pl-0">
                        ${badgeText ? html`
                            <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 border border-indigo-500/20 whitespace-nowrap shrink-0">
                                <span className="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
                                ${badgeText}
                            </span>
                        ` : html`<div></div>`}
                        <button className="p-1.5 sm:p-2 rounded-lg text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 bg-slate-100/50 hover:bg-slate-200 dark:bg-slate-800/50 dark:hover:bg-slate-700 transition-all duration-300">
                            <${Icon} name="chevron-down" className=${`w-5 h-5 transition-transform duration-500 ease-in-out ${isCollapsed ? '' : 'rotate-180'}`} />
                        </button>
                    </div>
                </div>
            `;
        };

        const StatusBadge = ({ text }) => {
            try {
                if (!text || text === '-' || text.toLowerCase() === 'n/a') {
                    return html`<span className="px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400">Belum Ada Data</span>`;
                }
                const lower = text.toLowerCase();
                if (lower.includes('tidak memenuhi')) {
                    return html`
                        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-rose-100 text-rose-700 dark:bg-rose-500/10 dark:text-rose-400 border border-rose-200 dark:border-rose-500/20 whitespace-nowrap">
                            <span className="w-1.5 h-1.5 rounded-full bg-rose-500 shrink-0"></span>
                            ${text}
                        </span>
                    `;
                } else if (lower.includes('memenuhi')) {
                    return html`
                        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-500/20 whitespace-nowrap">
                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 shrink-0"></span>
                            ${text}
                        </span>
                    `;
                }
                return html`
                    <span className="px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300 border border-slate-200 dark:border-slate-700 whitespace-nowrap">
                        ${text}
                    </span>
                `;
            } catch(e) { 
                return html`<span>${text}</span>`; 
            }
        };

        const MultiSelect = ({ label, options, selectedValues, onChange, iconName, dropdownId, activeDropdown, setActiveDropdown }) => {
            const [searchQuery, setSearchQuery] = useState("");
            const dropdownRef = useRef(null);
            const isThisOpen = activeDropdown === dropdownId;

            useEffect(() => {
                try { if (!isThisOpen) setSearchQuery(""); } catch (e) {}
            }, [isThisOpen]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    try {
                        if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                            if (activeDropdown === dropdownId) setActiveDropdown(null);
                        }
                    } catch (err) {}
                };
                document.addEventListener('mousedown', handleClickOutside);
                document.addEventListener('touchend', handleClickOutside, { passive: true });
                return () => {
                    try {
                        document.removeEventListener('mousedown', handleClickOutside);
                        document.removeEventListener('touchend', handleClickOutside);
                    } catch(e) {}
                };
            }, [activeDropdown, dropdownId, setActiveDropdown]);

            const toggleOption = (option, e) => {
                try {
                    if (e) { e.stopPropagation(); e.preventDefault(); }
                    if (selectedValues.includes(option)) {
                        onChange(selectedValues.filter(item => item !== option));
                    } else {
                        onChange([...selectedValues, option]);
                    }
                } catch (error) {}
            };

            const filteredOptions = useMemo(() => {
                try {
                    if (!searchQuery) return options;
                    return options.filter(opt => String(opt).toLowerCase().includes(searchQuery.toLowerCase()));
                } catch (e) { return options; }
            }, [options, searchQuery]);

            return html`
                <div className=${`relative w-full ${isThisOpen ? 'z-30' : 'z-10'}`} ref=${dropdownRef}>
                    <label className="flex items-center text-xs font-bold tracking-wider text-slate-700 dark:text-slate-300 mb-1.5 pl-1">
                        ${iconName && html`<${Icon} name=${iconName} className="w-3.5 h-3.5 mr-1.5 text-indigo-500/70 dark:text-indigo-400/70" />`}
                        ${label}
                    </label>
                    <div 
                        className=${`glass-panel w-full rounded-xl px-3 py-2.5 flex justify-between items-center cursor-pointer min-h-[44px] transition-all duration-300 ${
                            isThisOpen 
                                ? 'border-indigo-500 ring-2 ring-indigo-500/10 dark:ring-indigo-400/20 bg-white/95 dark:bg-slate-900/95' 
                                : 'hover:border-slate-300 dark:hover:border-slate-700 hover:bg-white dark:hover:bg-slate-900/40'
                        }`}
                        onClick=${() => {
                            try {
                                if (isThisOpen) setActiveDropdown(null);
                                else setActiveDropdown(dropdownId);
                            } catch(e) {}
                        }}
                    >
                        <div className="flex-1 overflow-hidden whitespace-nowrap text-ellipsis text-sm font-bold text-slate-900 dark:text-white pr-2">
                            ${selectedValues.length === 0 ? html`<span className="text-slate-500 dark:text-slate-400 font-medium">Pilih ${label}...</span>` : selectedValues.join(', ')}
                        </div>
                        <${Icon} name=${isThisOpen ? "chevron-up" : "chevron-down"} className="w-4 h-4 text-slate-400 dark:text-slate-500 shrink-0" />
                    </div>

                    ${isThisOpen && html`
                        <div className="absolute left-0 right-0 mt-2 glass-panel rounded-xl shadow-2xl flex flex-col dropdown-menu border-indigo-500/20 bg-white/95 dark:bg-slate-900/95 overflow-hidden">
                            <div className="p-2 border-b border-slate-100 dark:border-slate-800 flex items-center gap-2 bg-white/50 dark:bg-slate-900/50">
                                <${Icon} name="search" className="w-4 h-4 text-slate-400 shrink-0 ml-1" />
                                <input 
                                    type="text" 
                                    className="w-full bg-slate-50 dark:bg-slate-950/50 text-slate-800 dark:text-slate-150 text-sm py-1.5 px-2.5 rounded-lg border border-slate-200 dark:border-slate-800 focus:outline-none focus:border-indigo-500/50" 
                                    placeholder=${`Cari ${label}...`}
                                    value=${searchQuery}

        const Select = ({ label, value, options, onChange, disabled, iconName, dropdownId, activeDropdown, setActiveDropdown }) => {
            const [searchQuery, setSearchQuery] = useState("");
            const dropdownRef = useRef(null);
            const isThisOpen = activeDropdown === dropdownId;

            useEffect(() => {
                try { if (!isThisOpen) setSearchQuery(""); } catch (e) {}
            }, [isThisOpen]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    try {
                        if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                            if (activeDropdown === dropdownId) setActiveDropdown(null);
                        }
                    } catch (err) {}
                };
                document.addEventListener('mousedown', handleClickOutside);
                document.addEventListener('touchend', handleClickOutside, { passive: true });
                return () => {
                    try {
                        document.removeEventListener('mousedown', handleClickOutside);
                        document.removeEventListener('touchend', handleClickOutside);
                    } catch(e) {}
                };
            }, [activeDropdown, dropdownId, setActiveDropdown]);

            const filteredOptions = useMemo(() => {
                try {
                    if (!searchQuery) return options;
                    return options.filter(opt => String(opt).toLowerCase().includes(searchQuery.toLowerCase()));
                } catch (e) { return options; }
            }, [options, searchQuery]);

            const selectOption = (opt) => {
                try {
                    onChange(opt);
                    setActiveDropdown(null);
                } catch (err) {}
            };

            return html`
                <div className=${`relative w-full ${isThisOpen ? 'z-30' : 'z-10'}`} ref=${dropdownRef}>

                        ${label}

                    <div

                                : 'cursor-pointer hover:border-slate-300 dark:hover:border-slate-700 hover:bg-white dark:hover:bg-slate-900/40'
                        } ${isThisOpen ? 'border-indigo-500 ring-2 ring-indigo-500/10 dark:ring-indigo-400/20 bg-white/95 dark:bg-slate-900/95' : ''}`}
                        onClick=${() => {
                            try {
                                if (disabled) return;
                                if (isThisOpen) setActiveDropdown(null);
                                else setActiveDropdown(dropdownId);
                            } catch (e) {}
                        }}
                    >
                        <div className="flex-1 overflow-hidden whitespace-nowrap text-ellipsis text-sm font-bold text-slate-900 dark:text-white pr-2">
                            ${value ? value : html`<span className="text-slate-500 dark:text-slate-400 font-medium">Semua ${label}</span>`}

                        <${Icon} name=${isThisOpen ? "chevron-up" : "chevron-down"} className="w-4 h-4 text-slate-400 dark:text-slate-500 shrink-0" />
                    </div>

                    ${isThisOpen && !disabled && html`
                        <div className="absolute left-0 right-0 mt-2 glass-panel rounded-xl shadow-2xl flex flex-col dropdown-menu border-indigo-500/20 bg-white/95 dark:bg-slate-900/95 overflow-hidden">
                            <div className="p-2 border-b border-slate-100 dark:border-slate-800 flex items-center gap-2 bg-white/50 dark:bg-slate-900/50">
                                <${Icon} name="search" className="w-4 h-4 text-slate-400 shrink-0 ml-1" />
                                <input 
                                    type="text" 
                                    className="w-full bg-slate-50 dark:bg-slate-950/50 text-slate-800 dark:text-slate-150 text-sm py-1.5 px-2.5 rounded-lg border border-slate-200 dark:border-slate-800 focus:outline-none focus:border-indigo-500/50" 
                                    placeholder=${`Cari ${label}...`}
                                    value=${searchQuery}
                                    onChange=${(e) => setSearchQuery(e.target.value)}
                                    onClick=${(e) => e.stopPropagation()}
                                    onTouchEnd=${(e) => e.stopPropagation()}
                                />

                            <div className="overflow-y-auto touch-scroll flex-1 p-1 max-h-[40vh] sm:max-h-60">
                                <div 
                                    className="p-2.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer text-slate-500 dark:text-slate-400 text-sm font-semibold transition-colors"
                                    onClick=${() => selectOption("")}
                                >
                                    Semua ${label}
                                </div>
                                ${filteredOptions.map((option) => html`
                                    <div 
                                        key=${option} 
                                        className=${`p-2.5 rounded-lg hover:bg-indigo-50 dark:hover:bg-indigo-950/40 cursor-pointer text-sm font-medium transition-colors ${
                                            value === option ? 'text-indigo-600 dark:text-indigo-400 bg-indigo-50/50 dark:bg-indigo-950/20' : 'text-slate-700 dark:text-slate-200'
                                        }`}
                                        onClick=${() => selectOption(option)}

                    `}

            `;
        };

        // --- 2. KOMPONEN FILTER UTAMA (BAGIAN 1) ---
        const FilterGroup = ({ data, filters, setFilters, title, activeDropdown, setActiveDropdown, prefixId }) => {
            const [isCollapsed, setIsCollapsed] = useState(false);

            const years = useMemo(() => {
                try { return [...new Set(data.map(d => d.tahun).filter(Boolean))].sort(); } 
                catch(e) { return []; }
            }, [data]);
            
            const jenisTPPs = useMemo(() => {
                try { return [...new Set(data.map(d => d.jenisTPP).filter(Boolean))].sort(); }

            }, [data]);
            
            const statusIKLOptions = useMemo(() => {
                try { return [...new Set(data.map(d => d.statusIKL).filter(Boolean))].sort(); }
                catch(e) { return []; }
            }, [data]);
            
            const statusKapOptions = useMemo(() => {
                try { return [...new Set(data.map(d => d.statusKapasitas).filter(Boolean))].sort(); }

            const statusPanganOptions = useMemo(() => {

            const provs = useMemo(() => {

            const kabs = useMemo(() => {

            }, [data, filters.provinsi]);
            
            const kecs = useMemo(() => {

                    if (filters.kabupaten) filtered = filtered.filter(d => d.kabupaten === filters.kabupaten);
                    else if (filters.provinsi) filtered = filtered.filter(d => d.provinsi === filters.provinsi);
                    return [...new Set(filtered.map(d => d.kecamatan).filter(Boolean))].sort();
                } catch(e) { return []; }
            }, [data, filters.provinsi, filters.kabupaten]);
            
            const pusks = useMemo(() => {
                try {
                    let filtered = data;
                    if (filters.kecamatan) filtered = filtered.filter(d => d.kecamatan === filters.kecamatan);
                    else if (filters.kabupaten) filtered = filtered.filter(d => d.kabupaten === filters.kabupaten);
                    return [...new Set(filtered.map(d => d.puskesmas).filter(Boolean))].sort();
                } catch(e) { return []; }
            }, [data, filters.kabupaten, filters.kecamatan]);

            const activeFiltersCount = useMemo(() => {
                try {
                    let count = 0;
                    if (filters.tahun && filters.tahun.length > 0) count++;
                    if (filters.provinsi) count++;
                    if (filters.kabupaten) count++;
                    if (filters.kecamatan) count++;
                    if (filters.puskesmas) count++;
                    if (filters.jenisTPP) count++;
                    if (filters.statusIKL && filters.statusIKL.length > 0) count++;
                    if (filters.statusKapasitas && filters.statusKapasitas.length > 0) count++;
                    if (filters.statusPangan && filters.statusPangan.length > 0) count++;
                    return count;
                } catch (e) { return 0; }
            }, [filters]);

            return html`
                <div className="glass-panel p-4 sm:p-6 rounded-3xl mb-6 relative border-slate-200/80 dark:border-white/10 shadow-xl shadow-slate-100/50 dark:shadow-black/20 hover:border-indigo-500/20 dark:hover:border-indigo-400/20 transition-all duration-300">
                    <${SectionHeader} 
                        title=${title} 
                        iconName="filter" 
                        badgeText=${activeFiltersCount > 0 ? `${activeFiltersCount} Filter Aktif` : null} 
                        isCollapsed=${isCollapsed}
                        onToggle=${() => { try { setIsCollapsed(!isCollapsed) } catch(e){} }}
                    />
                    
                    ${!isCollapsed && html`
                        <div className="animate-fade-in-up mt-4">
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
                                <${Select} 
                                    label="Provinsi" iconName="map"
                                    options=${provs} value=${filters.provinsi || ""} 
                                    onChange=${(val) => { try { setFilters({...filters, provinsi: val, kabupaten: '', kecamatan: '', puskesmas: ''}) } catch(e){} }} 
                                    dropdownId=${`${prefixId}-provinsi`} activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown}
                                />
                                <${Select} 
                                    label="Kabupaten/Kota" iconName="map-pin"
                                    options=${kabs} value=${filters.kabupaten || ""} 
                                    onChange=${(val) => { try { setFilters({...filters, kabupaten: val, kecamatan: '', puskesmas: ''}) } catch(e){} }} 
                                    disabled=${!filters.provinsi}
                                    dropdownId=${`${prefixId}-kabupaten`} activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown}
                                />
                                <${Select} 
                                    label="Kecamatan" iconName="compass"
                                    options=${kecs} value=${filters.kecamatan || ""} 
                                    onChange=${(val) => { try { setFilters({...filters, kecamatan: val, puskesmas: ''}) } catch(e){} }} 
                                    disabled=${!filters.kabupaten}
                                    dropdownId=${`${prefixId}-kecamatan`} activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown}
                                />

                                <${Select} 
                                    label="Puskesmas" iconName="building"
                                    options=${pusks} value=${filters.puskesmas || ""} 
                                    onChange=${(val) => { try { setFilters({...filters, puskesmas: val}) } catch(e){} }} 
                                    disabled=${!filters.kecamatan}
                                    dropdownId=${`${prefixId}-puskesmas`} activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown}
                                />
                                <${Select} 
                                    label="Jenis TPP" iconName="utensils"
                                    options=${jenisTPPs} value=${filters.jenisTPP || ""} 
                                    onChange=${(val) => { try { setFilters({...filters, jenisTPP: val}) } catch(e){} }} 
                                    dropdownId=${`${prefixId}-jenisTPP`} activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown}
                                />
                                <${MultiSelect} 
                                    label="Tahun Input TPP" iconName="calendar"
                                    options=${years} selectedValues=${filters.tahun || []} 
                                    onChange=${(val) => { try { setFilters({...filters, tahun: val}) } catch(e){} }} 
                                    dropdownId=${`${prefixId}-tahun`} activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown}
                                />

                                <${MultiSelect} 
                                    label="Status Inspeksi Kesling" iconName="clipboard-check"
                                    options=${statusIKLOptions} selectedValues=${filters.statusIKL || []} 
                                    onChange=${(val) => { try { setFilters({...filters, statusIKL: val}) } catch(e){} }} 
                                    dropdownId=${`${prefixId}-statusIKL`} activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown}
                                />
                                <${MultiSelect} 
                                    label="Status Peningkatan Kapasitas" iconName="trending-up"
                                    options=${statusKapOptions} selectedValues=${filters.statusKapasitas || []} 
                                    onChange=${(val) => { try { setFilters({...filters, statusKapasitas: val}) } catch(e){} }} 
                                    dropdownId=${`${prefixId}-statusKapasitas`} activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown}
                                />
                                <${MultiSelect} 
                                    label="Status Pemeriksaan Pangan" iconName="shield-check"
                                    options=${statusPanganOptions} selectedValues=${filters.statusPangan || []} 
                                    onChange=${(val) => { try { setFilters({...filters, statusPangan: val}) } catch(e){} }} 
                                    dropdownId=${`${prefixId}-statusPangan`} activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown}
                                />
                            </div>
                            
                            <div className="mt-5 pt-4 border-t border-slate-100 dark:border-slate-800/60 flex justify-end">
                                <button 
                                    onClick=${() => {
                                        try {
                                            setFilters({
                                                tahun: [], provinsi: '', kabupaten: '', kecamatan: '', puskesmas: '', 
                                                jenisTPP: '', statusIKL: [], statusKapasitas: [], statusPangan: []
                                            })
                                        } catch (err) {}
                                    }}
                                    className="px-4 py-2.5 min-h-[44px] text-xs font-bold rounded-xl text-slate-700 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50/50 dark:hover:bg-indigo-950/20 active:bg-indigo-100 dark:active:bg-indigo-900 transition-all duration-300 flex items-center shadow-sm active:scale-95"
                                >
                                    <${Icon} name="rotate-ccw" className="w-4 h-4 mr-2" />
                                    reset filter
                                </button>
                            </div>
                        </div>
                    `}
                </div>
            `;
        };

        // --- 3. FUNGSI UTILITAS PENGOLAHAN DATA ---
        const applyFilters = (data, filters) => {
            try {
                if (!Array.isArray(data)) return [];
                return data.filter(item => {
                    if (filters.tahun && filters.tahun.length > 0 && !filters.tahun.includes(item.tahun)) return false;
                    if (filters.provinsi && item.provinsi !== filters.provinsi) return false;
                    if (filters.kabupaten && item.kabupaten !== filters.kabupaten) return false;
                    if (filters.kecamatan && item.kecamatan !== filters.kecamatan) return false;
                    if (filters.puskesmas && item.puskesmas !== filters.puskesmas) return false;
                    if (filters.jenisTPP && item.jenisTPP !== filters.jenisTPP) return false;
                    if (filters.statusIKL && filters.statusIKL.length > 0 && !filters.statusIKL.includes(item.statusIKL)) return false;
                    if (filters.statusKapasitas && filters.statusKapasitas.length > 0 && !filters.statusKapasitas.includes(item.statusKapasitas)) return false;
                    if (filters.statusPangan && filters.statusPangan.length > 0 && !filters.statusPangan.includes(item.statusPangan)) return false;
                    return true;
                });
            } catch (error) { return []; }
        };

        const calculateKPIs = (data, filters) => {
            try {
                if (!Array.isArray(data)) throw new Error("Data must be an array");
                const total = data.length;
                
                const msIKL = data.filter(d => d.statusIKL && d.statusIKL.toLowerCase().includes('memenuhi') && !d.statusIKL.toLowerCase().includes('tidak memenuhi')).length;
                const msKapasitas = data.filter(d => d.statusKapasitas && d.statusKapasitas.toLowerCase().includes('memenuhi') && !d.statusKapasitas.toLowerCase().includes('tidak memenuhi')).length;
                const msPangan = data.filter(d => d.statusPangan && d.statusPangan.toLowerCase().includes('memenuhi') && !d.statusPangan.toLowerCase().includes('tidak memenuhi')).length;
                const msTPP = data.filter(d => d.statusTPP && d.statusTPP.toLowerCase().includes('memenuhi') && !d.statusTPP.toLowerCase().includes('tidak memenuhi')).length;
                
                const msSLHS = data.filter(d => {
                    try {
                        const startMatch = d.tglSLHS ? d.tglSLHS.match(/\b(20\d{2})\b/) : null;
                        const endMatch = d.slhsKadaluarsa ? d.slhsKadaluarsa.match(/\b(20\d{2})\b/) : null;
                        
                        if (!startMatch || !endMatch) return false;
                        
                        const startYear = parseInt(startMatch[1], 10);
                        const endYear = parseInt(endMatch[1], 10);
                        
                        const yearsToCheck = (filters && filters.tahun && filters.tahun.length > 0) 
                            ? filters.tahun.map(y => parseInt(y, 10)) 
                            : [parseInt(d.tahun, 10)]; 
                        
                        return yearsToCheck.some(y => !isNaN(y) && y >= startYear && y <= endYear);
                    } catch (e) {
                        return false;
                    }
                }).length;
                
                return {
                    total,
                    valIKL: msIKL,
                    pctIKL: safePct(msIKL, total),
                    valKapasitas: msKapasitas,
                    pctKapasitas: safePct(msKapasitas, total),
                    valPangan: msPangan,
                    pctPangan: safePct(msPangan, total),
                    valTPP: msTPP,
                    pctTPP: safePct(msTPP, total),
                    valSLHS: msSLHS,
                    pctSLHS: safePct(msSLHS, total),
                };
            } catch (error) {
                return { total: 0, valIKL: 0, pctIKL: 0, valKapasitas: 0, pctKapasitas: 0, valPangan: 0, pctPangan: 0, valTPP: 0, pctTPP: 0, valSLHS: 0, pctSLHS: 0 };
            }
        };

        const calculateChartData = (data) => {
            try {
                const result = { ikl: {}, kapasitas: {}, pangan: {}, tpp: {} };
                if (!Array.isArray(data)) return result;

                data.forEach(item => {
                    const ikl = item.statusIKL && item.statusIKL !== '-' ? item.statusIKL : 'Belum Ada Data';
                    const kap = item.statusKapasitas && item.statusKapasitas !== '-' ? item.statusKapasitas : 'Belum Ada Data';
                    const pang = item.statusPangan && item.statusPangan !== '-' ? item.statusPangan : 'Belum Ada Data';
                    const tpp = item.statusTPP && item.statusTPP !== '-' ? item.statusTPP : 'Belum Ada Data';

                    result.ikl[ikl] = (result.ikl[ikl] || 0) + 1;
                    result.kapasitas[kap] = (result.kapasitas[kap] || 0) + 1;
                    result.pangan[pang] = (result.pangan[pang] || 0) + 1;
                    result.tpp[tpp] = (result.tpp[tpp] || 0) + 1;
                });
                
                return result;
            } catch (error) {
                console.error("Error in calculateChartData:", error);
                return { ikl: {}, kapasitas: {}, pangan: {}, tpp: {} };
            }
        };

        const calculateBarChartData = (data) => {
            try {
                const yearsSet = new Set();
                data.forEach(d => {
                    if (d.tahun && !isNaN(parseInt(d.tahun))) {
                        yearsSet.add(d.tahun);
                    }
                });
                
                const yearsArray = Array.from(yearsSet).sort((a, b) => parseInt(a) - parseInt(b));
                
                const result = {
                    labels: yearsArray,
                    totalTPP: yearsArray.map(() => 0),
                    tppMS: yearsArray.map(() => 0),
                    slhs: yearsArray.map(() => 0)
                };

                data.forEach(item => {
                    const itemTahun = item.tahun;
                    const yearIdx = yearsArray.indexOf(itemTahun);

                    if (yearIdx !== -1) {
                        result.totalTPP[yearIdx] += 1;
                        const tpp = item.statusTPP ? String(item.statusTPP).toLowerCase() : '';
                        if (tpp.includes('memenuhi') && !tpp.includes('tidak memenuhi')) {
                            result.tppMS[yearIdx] += 1;
                        }
                    }

                    let startYear = null, endYear = null;
                    try {
                        const sMatch = item.tglSLHS ? String(item.tglSLHS).match(/\b(20\d{2})\b/) : null;
                        const eMatch = item.slhsKadaluarsa ? String(item.slhsKadaluarsa).match(/\b(20\d{2})\b/) : null;
                        if (sMatch && eMatch) {
                            startYear = parseInt(sMatch[1], 10);
                            endYear = parseInt(eMatch[1], 10);
                        }
                    } catch (e) {}

                    if (startYear !== null && endYear !== null) {
                        yearsArray.forEach((y, idx) => {
                            const yInt = parseInt(y, 10);
                            if (yInt >= startYear && yInt <= endYear) {
                                result.slhs[idx] += 1;
                            }
                        });
                    }
                });

                return result;
            } catch (err) {
                console.error("Error in calculateBarChartData:", err);
                return { labels: [], totalTPP: [], tppMS: [], slhs: [] };
            }
        };

        const getChartColors = (labels) => {
            try {
                return labels.map((label) => {
                    const lowerLabel = String(label).toLowerCase().trim();
                    if (lowerLabel.includes('memenuhi') && !lowerLabel.includes('tidak memenuhi')) {
                        return '#7BB662'; // Hijau
                    }
                    if (lowerLabel.includes('tidak memenuhi')) {
                        return '#E03C32'; // Merah
                    }
                    if (lowerLabel.includes('belum ikl') || lowerLabel.includes('belum diperiksa') || lowerLabel === 'belum') {
                        return '#FFD301'; // Kuning
                    }
                    return '#cbd5e1'; 
                });
            } catch (err) {
                return labels.map(() => '#cbd5e1');
            }
        };

        const sortPieData = (title, dataObj) => {
            try {
                const keys = Object.keys(dataObj);
                let order = [];
                const lowerTitle = title.toLowerCase();
                
                if (lowerTitle.includes('kesling')) {
                    order = ['memenuhi syarat', 'tidak memenuhi syarat', 'belum ikl'];
                } else if (lowerTitle.includes('kapasitas')) {
                    order = ['memenuhi syarat', 'tidak memenuhi syarat'];
                } else if (lowerTitle.includes('pangan')) {
                    order = ['memenuhi syarat', 'tidak memenuhi syarat', 'belum diperiksa'];
                } else if (lowerTitle.includes('status tpp') || lowerTitle.includes('tpp memenuhi syarat')) {
                    order = ['memenuhi syarat', 'tidak memenuhi syarat'];
                }

                keys.sort((a, b) => {
                    const idxA = order.indexOf(a.toLowerCase().trim());
                    const idxB = order.indexOf(b.toLowerCase().trim());
                    
                    if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                    if (idxA !== -1) return -1;
                    if (idxB !== -1) return 1;
                    return a.localeCompare(b);
                });

                const sortedObj = {};
                keys.forEach(k => {
                    sortedObj[k] = dataObj[k];
                });
                return sortedObj;
            } catch (err) {
                return dataObj;
            }
        };

        const getComparisonIndicator = (valA, valB, isTimeCompare) => {
            try {
                if (valA === undefined || valB === undefined || isNaN(valA) || isNaN(valB)) return null;

                            let bVal = String(b[sortConfig.key] || '').toLowerCase();
                            
                            if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                            if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                            return 0;
                        });

                    return sortableItems;
