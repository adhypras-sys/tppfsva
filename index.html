<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data TPP untuk FSVA</title>
    
    <!-- Tailwind CSS untuk Styling Modern & Responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfigurasi Tailwind untuk Dark Mode & Glassmorphism -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.1)',
                        glassBorder: 'rgba(255, 255, 255, 0.15)',
                        glassDark: 'rgba(11, 17, 32, 0.65)',
                        glassLight: 'rgba(255, 255, 255, 0.75)',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PapaParse untuk membaca Google Sheet sebagai CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* Transisi Global Mulus */
        body {
            transition: background-color 0.6s cubic-bezier(0.16, 1, 0.3, 1), color 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            min-height: 100vh;
        }

        /* TEMA TERANG (Default Modern Style) */
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(224, 231, 255, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(209, 250, 229, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
            color: #0f172a;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.02);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* TEMA GELAP (Cyberpunk Aurora Mesh) */
        .dark body {
            background-color: #060913;
            background-image: 
                radial-gradient(at 0% 0%, rgba(67, 56, 202, 0.18) 0px, transparent 40%), 
                radial-gradient(at 50% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 45%), 
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 40%);
            background-attachment: fixed;
            color: #f8fafc;
        }
        
        .dark .glass-panel {
            background: rgba(11, 18, 36, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 15px 35px -15px rgba(0, 0, 0, 0.6), 0 1px 3px rgba(255, 255, 255, 0.02);
        }

        /* Kustomisasi Scrollbar Minimalis */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.25); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }

        /* Animasi Transisi Dropdown Menu (Elastic Slide Down) */
        .dropdown-menu {
            animation: dropdownBounce 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: top;
        }

        @keyframes dropdownBounce {
            from {
                opacity: 0;
                transform: scaleY(0.8) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: scaleY(1) translateY(0);
            }
        }

        /* Animasi Slide-Up Lembut saat Konten Dimuat */
        .slide-up {
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animasi Denyut Teks (Pulsing Glow) */
        .pulse-text {
            animation: pulseText 2s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%, 100% {
                opacity: 0.7;
                filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0));
            }
            50% {
                opacity: 1;
                filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.4));
            }
        }

        /* Animasi Ring Spinner Mewah */
        .spinner-ring {
            position: relative;
            width: 54px;
            height: 54px;
        }
        .spinner-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-radius: 50%;
            animation: ringRotate 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .spinner-ring div:nth-child(1) {
            border-top-color: #6366f1;
            animation-delay: -0.45s;
        }
        .spinner-ring div:nth-child(2) {
            border-top-color: #10b981;
            animation-delay: -0.3s;
        }
        .spinner-ring div:nth-child(3) {
            border-top-color: #8b5cf6;
            animation-delay: -0.15s;
        }

        @keyframes ringRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 0. FUNGSI UTILITAS FORMAT TEKS & ANGKA ---
        
        // Mengubah teks UPPERCASE menjadi Title Case (Huruf Kapital di Awal Kata)
        const toTitleCase = (str) => {
            try {
                if (!str) return '';
                let result = str
                    .toLowerCase()
                    .split(/\s+/)
                    .map(word => {
                        if (word.length === 0) return '';
                        return word.charAt(0).toUpperCase() + word.slice(1);
                    })
                    .join(' ');
                
                // Aturan khusus: Gunakan Upper Case hanya untuk pilihan DKI pada DKI Jakarta dan DI pada DI Yogyakarta
                result = result.replace(/\bDki\b/g, 'DKI');
                result = result.replace(/\bDi Yogyakarta\b/g, 'DI Yogyakarta');
                
                return result;
            } catch (err) {
                console.error("Error in toTitleCase:", err);
                return str;
            }
        };

        // Memformat angka bulat ke format Indonesia (titik sebagai pemisah ribuan)
        const formatIntegerID = (num) => {
            try {
                if (num === undefined || num === null || isNaN(num)) return '0';
                return new Intl.NumberFormat('id-ID', { maximumFractionDigits: 0 }).format(num);
            } catch (err) {
                console.error("Error in formatIntegerID:", err);
                return String(num);
            }
        };

        // Memformat angka desimal ke format Indonesia dengan MAKSIMAL 2 angka di belakang koma (tanpa trailing zero berlebihan)
        const formatDecimalID = (num, maxDecimals = 2) => {
            try {
                if (num === undefined || num === null || isNaN(num)) return '0';
                return new Intl.NumberFormat('id-ID', { 
                    minimumFractionDigits: 0, 
                    maximumFractionDigits: maxDecimals 
                }).format(num);
            } catch (err) {
                console.error("Error in formatDecimalID:", err);
                let formatted = Number(num).toFixed(maxDecimals);
                if (formatted.indexOf('.') !== -1) {
                    formatted = formatted.replace(/\.?0+$/, '');
                }
                return formatted.replace('.', ',');
            }
        };

        // --- 1. KOMPONEN UI KUSTOM ---

        // Komponen Ikon Vektor Lucide dengan penanganan siklus hidup yang dioptimalkan
        const Icon = ({ name, className }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                try {
                    if (window.lucide && containerRef.current) {
                        containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        window.lucide.createIcons({
                            nameAttr: 'data-lucide',
                            attrs: { class: className },
                            root: containerRef.current
                        });
                    }
                } catch (err) {
                    console.error("Icon render error:", err);
                }
            }, [name, className]);
            return <span ref={containerRef} style={{ display: 'contents' }}></span>;
        };

        // Custom Multi-Select Dropdown dengan Animasi & Z-Index Sempurna
        const MultiSelect = ({ label, options, selectedValues, onChange, iconName }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    try {
                        if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false);
                    } catch (err) {
                        console.error("Error handling click outside:", err);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const toggleOption = (option) => {
                try {
                    if (selectedValues.includes(option)) {
                        onChange(selectedValues.filter(item => item !== option));
                    } else {
                        onChange([...selectedValues, option]);
                    }
                } catch (error) {
                    console.error("Error toggling option:", error);
                }
            };

            return (
                <div className={`relative w-full transition-all duration-300 ${isOpen ? 'z-30' : 'z-10'}`} ref={dropdownRef}>
                    <label className="flex items-center text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-400 mb-1.5 pl-1">
                        {iconName && <Icon name={iconName} className="w-3.5 h-3.5 mr-1.5 text-indigo-500/70 dark:text-indigo-400/70" />}
                        {label}
                    </label>
                    <div 
                        className={`glass-panel w-full rounded-xl px-3 py-2.5 flex justify-between items-center cursor-pointer min-h-[44px] transition-all duration-300 ${
                            isOpen 
                                ? 'border-indigo-500 ring-2 ring-indigo-500/10 dark:ring-indigo-400/20 bg-white/95 dark:bg-slate-900/90' 
                                : 'hover:border-slate-300 dark:hover:border-slate-700 hover:bg-white dark:hover:bg-slate-900/40'
                        }`}
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <div className="flex-1 overflow-hidden whitespace-nowrap text-sm font-medium text-slate-700 dark:text-slate-200">
                            {selectedValues.length === 0 ? <span className="text-slate-400/80 dark:text-slate-500/80">Pilih {label}...</span> : selectedValues.join(', ')}
                        </div>
                        <Icon name={isOpen ? "chevron-up" : "chevron-down"} className="w-4 h-4 text-slate-400 dark:text-slate-500 ml-2" />
                    </div>

                    {isOpen && (
                        <div className="absolute z-50 w-full mt-2 glass-panel rounded-xl shadow-2xl max-h-60 overflow-auto dropdown-menu border-indigo-500/20 bg-white/95 dark:bg-slate-900/95">
                            {options.map((option, idx) => (
                                <div 
                                    key={idx} 
                                    className="flex items-center p-3 hover:bg-indigo-50 dark:hover:bg-indigo-950/40 cursor-pointer text-slate-700 dark:text-slate-200 transition-colors duration-150"
                                    onClick={() => toggleOption(option)}
                                >
                                    <input 
                                        type="checkbox" 
                                        className="mr-3 w-4 h-4 rounded border-slate-300 dark:border-slate-700 text-indigo-600 focus:ring-indigo-500 focus:ring-opacity-50"
                                        checked={selectedValues.includes(option)}
                                        readOnly
                                    />
                                    <span className="text-sm font-medium">{option}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // Custom Single Select (Hierarchical) dengan Desain Presisi
        const Select = ({ label, value, options, onChange, disabled, iconName }) => {
            return (
                <div className="w-full">
                    <label className="flex items-center text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-400 mb-1.5 pl-1">
                        {iconName && <Icon name={iconName} className="w-3.5 h-3.5 mr-1.5 text-indigo-500/70 dark:text-indigo-400/70" />}
                        {label}
                    </label>
                    <div className="relative">
                        <select 
                            className={`w-full glass-panel rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 dark:text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 dark:focus:ring-indigo-400/20 appearance-none transition-all duration-300 ${
                                disabled 
                                    ? 'opacity-40 cursor-not-allowed bg-slate-100/50 dark:bg-slate-900/20' 
                                    : 'cursor-pointer hover:border-slate-300 dark:hover:border-slate-700 hover:bg-white dark:hover:bg-slate-900/40'
                            }`}
                            value={value}
                            onChange={(e) => {
                                try {
                                    onChange(e.target.value);
                                } catch(err) {
                                    console.error("Error selecting option:", err);
                                }
                            }}
                            disabled={disabled}
                        >
                            <option value="" className="text-slate-800 dark:text-slate-900 font-medium">Semua {label}</option>
                            {options.map((opt, idx) => (
                                <option key={idx} value={opt} className="text-slate-800 dark:text-slate-900 font-medium">{opt}</option>
                            ))}
                        </select>
                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 dark:text-slate-500">
                            <Icon name="chevron-down" className="w-4 h-4" />
                        </div>
                    </div>
                </div>
            );
        };

        // --- 2. KOMPONEN FILTER UTAMA ---
        const FilterGroup = ({ data, filters, setFilters, title }) => {
            const years = useMemo(() => [...new Set(data.map(d => d.tahun).filter(Boolean))].sort(), [data]);
            const jenisTPPs = useMemo(() => [...new Set(data.map(d => d.jenisTPP).filter(Boolean))].sort(), [data]);
            
            const statusIKLOptions = useMemo(() => [...new Set(data.map(d => d.statusIKL).filter(Boolean))].sort(), [data]);
            const statusKapOptions = useMemo(() => [...new Set(data.map(d => d.statusKapasitas).filter(Boolean))].sort(), [data]);
            const statusPanganOptions = useMemo(() => [...new Set(data.map(d => d.statusPangan).filter(Boolean))].sort(), [data]);

            const provs = useMemo(() => [...new Set(data.map(d => d.provinsi).filter(Boolean))].sort(), [data]);
            const kabs = useMemo(() => {
                let filtered = data;
                if (filters.provinsi) filtered = filtered.filter(d => d.provinsi === filters.provinsi);
                return [...new Set(filtered.map(d => d.kabupaten).filter(Boolean))].sort();
            }, [data, filters.provinsi]);
            const kecs = useMemo(() => {
                let filtered = data;
                if (filters.kabupaten) filtered = filtered.filter(d => d.kabupaten === filters.kabupaten);
                else if (filters.provinsi) filtered = filtered.filter(d => d.provinsi === filters.provinsi);
                return [...new Set(filtered.map(d => d.kecamatan).filter(Boolean))].sort();
            }, [data, filters.provinsi, filters.kabupaten]);
            const pusks = useMemo(() => {
                let filtered = data;
                if (filters.kecamatan) filtered = filtered.filter(d => d.kecamatan === filters.kecamatan);
                else if (filters.kabupaten) filtered = filtered.filter(d => d.kabupaten === filters.kabupaten);
                return [...new Set(filtered.map(d => d.puskesmas).filter(Boolean))].sort();
            }, [data, filters.kabupaten, filters.kecamatan]);

            return (
                <div className="glass-panel p-6 rounded-3xl mb-6 relative z-20 border-slate-200/80 dark:border-white/10 shadow-xl shadow-slate-100/50 dark:shadow-black/20 hover:border-indigo-500/20 dark:hover:border-indigo-400/20">
                    <h2 className="text-xl font-bold mb-5 text-indigo-600 dark:text-indigo-400 flex items-center">
                        <span className="p-2 rounded-xl bg-indigo-50 dark:bg-indigo-950/60 text-indigo-600 dark:text-indigo-400 mr-3 flex items-center justify-center">
                            <Icon name="filter" className="w-5 h-5" />
                        </span> 
                        {title}
                    </h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                        <MultiSelect 
                            label="Tahun Input TPP" 
                            iconName="calendar"
                            options={years} 
                            selectedValues={filters.tahun} 
                            onChange={(val) => setFilters({...filters, tahun: val})} 
                        />

                        <Select 
                            label="Provinsi" 
                            iconName="map"
                            options={provs} 
                            value={filters.provinsi} 
                            onChange={(val) => setFilters({...filters, provinsi: val, kabupaten: '', kecamatan: '', puskesmas: ''})} 
                        />
                        <Select 
                            label="Kabupaten/Kota" 
                            iconName="map-pin"
                            options={kabs} 
                            value={filters.kabupaten} 
                            onChange={(val) => setFilters({...filters, kabupaten: val, kecamatan: '', puskesmas: ''})} 
                            disabled={!filters.provinsi}
                        />
                        <Select 
                            label="Kecamatan" 
                            iconName="compass"
                            options={kecs} 
                            value={filters.kecamatan} 
                            onChange={(val) => setFilters({...filters, kecamatan: val, puskesmas: ''})} 
                            disabled={!filters.kabupaten}
                        />
                        <Select 
                            label="Puskesmas" 
                            iconName="building"
                            options={pusks} 
                            value={filters.puskesmas} 
                            onChange={(val) => setFilters({...filters, puskesmas: val})} 
                            disabled={!filters.kecamatan}
                        />

                        <Select 
                            label="Jenis TPP" 
                            iconName="utensils"
                            options={jenisTPPs} 
                            value={filters.jenisTPP} 
                            onChange={(val) => setFilters({...filters, jenisTPP: val})} 
                        />

                        <MultiSelect 
                            label="Status Inspeksi Kesling" 
                            iconName="clipboard-check"
                            options={statusIKLOptions} 
                            selectedValues={filters.statusIKL} 
                            onChange={(val) => setFilters({...filters, statusIKL: val})} 
                        />
                        <MultiSelect 
                            label="Status Peningkatan Kapasitas" 
                            iconName="trending-up"
                            options={statusKapOptions} 
                            selectedValues={filters.statusKapasitas} 
                            onChange={(val) => setFilters({...filters, statusKapasitas: val})} 
                        />
                        <MultiSelect 
                            label="Status Pemeriksaan Pangan" 
                            iconName="shield-check"
                            options={statusPanganOptions} 
                            selectedValues={filters.statusPangan} 
                            onChange={(val) => setFilters({...filters, statusPangan: val})} 
                        />
                    </div>
                    
                    <div className="mt-5 pt-4 border-t border-slate-100 dark:border-slate-800/60 flex justify-end">
                        <button 
                            onClick={() => {
                                try {
                                    setFilters({
                                        tahun: [], provinsi: '', kabupaten: '', kecamatan: '', puskesmas: '', 
                                        jenisTPP: '', statusIKL: [], statusKapasitas: [], statusPangan: []
                                    })
                                } catch (err) {
                                    console.error("Error resetting filter:", err);
                                }
                            }}
                            className="px-4 py-2 text-xs font-semibold rounded-lg text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-300 hover:bg-indigo-50/50 dark:hover:bg-indigo-950/20 transition-all duration-300 flex items-center"
                        >
                            <Icon name="rotate-ccw" className="w-3.5 h-3.5 mr-1.5" />
                            Reset Kriteria
                        </button>
                    </div>
                </div>
            );
        };

        // --- 3. FUNGSI UTILITAS PENGOLAHAN DATA ---
        const applyFilters = (data, filters) => {
            try {
                return data.filter(item => {
                    if (filters.tahun.length > 0 && !filters.tahun.includes(item.tahun)) return false;
                    if (filters.provinsi && item.provinsi !== filters.provinsi) return false;
                    if (filters.kabupaten && item.kabupaten !== filters.kabupaten) return false;
                    if (filters.kecamatan && item.kecamatan !== filters.kecamatan) return false;
                    if (filters.puskesmas && item.puskesmas !== filters.puskesmas) return false;
                    if (filters.jenisTPP && item.jenisTPP !== filters.jenisTPP) return false;
                    if (filters.statusIKL.length > 0 && !filters.statusIKL.includes(item.statusIKL)) return false;
                    if (filters.statusKapasitas.length > 0 && !filters.statusKapasitas.includes(item.statusKapasitas)) return false;
                    if (filters.statusPangan.length > 0 && !filters.statusPangan.includes(item.statusPangan)) return false;
                    return true;
                });
            } catch (error) {
                console.error("Error applying filters:", error);
                return [];
            }
        };

        const calculateKPIs = (data) => {
            try {
                const total = data.length;
                
                const msIKL = data.filter(d => d.statusIKL && d.statusIKL.toLowerCase().includes('memenuhi') && !d.statusIKL.toLowerCase().includes('tidak memenuhi')).length;
                const msKapasitas = data.filter(d => d.statusKapasitas && d.statusKapasitas.toLowerCase().includes('memenuhi') && !d.statusKapasitas.toLowerCase().includes('tidak memenuhi')).length;
                const msPangan = data.filter(d => d.statusPangan && d.statusPangan.toLowerCase().includes('memenuhi') && !d.statusPangan.toLowerCase().includes('tidak memenuhi')).length;
                const msTPP = data.filter(d => d.statusTPP && d.statusTPP.toLowerCase().includes('memenuhi') && !d.statusTPP.toLowerCase().includes('tidak memenuhi')).length;
                
                return {
                    total,
                    valIKL: msIKL,
                    pctIKL: total ? (msIKL / total) * 100 : 0,
                    valKapasitas: msKapasitas,
                    pctKapasitas: total ? (msKapasitas / total) * 100 : 0,
                    valPangan: msPangan,
                    pctPangan: total ? (msPangan / total) * 100 : 0,
                    valTPP: msTPP,
                    pctTPP: total ? (msTPP / total) * 100 : 0,
                };
            } catch (error) {
                console.error("Error calculating KPIs:", error);
                return { total: 0, valIKL: 0, pctIKL: 0, valKapasitas: 0, pctKapasitas: 0, valPangan: 0, pctPangan: 0, valTPP: 0, pctTPP: 0 };
            }
        };

        const getComparisonIndicator = (valA, valB, isTimeCompare) => {
            try {
                if (valA === valB) return { text: 'Sama', color: 'text-slate-500 dark:text-slate-400 bg-slate-500/10', icon: 'minus' };
                
                const diff = valB - valA;
                const isIncrease = valB > valA;
                const formattedDiff = formatDecimalID(Math.abs(diff), 2); // Maksimal 2 desimal

                if (isTimeCompare) {
                    return {
                        text: `${isIncrease ? 'Naik' : 'Turun'} ${formattedDiff}`,
                        color: isIncrease ? 'text-emerald-600 dark:text-emerald-400 bg-emerald-500/10' : 'text-rose-600 dark:text-rose-400 bg-rose-500/10',
                        icon: isIncrease ? 'trending-up' : 'trending-down'
                    };
                } else {
                    return {
                        text: `${isIncrease ? 'Lebih Tinggi' : 'Lebih Rendah'} ${formattedDiff}`,
                        color: isIncrease ? 'text-emerald-600 dark:text-emerald-400 bg-emerald-500/10' : 'text-rose-600 dark:text-rose-400 bg-rose-500/10',
                        icon: isIncrease ? 'arrow-up' : 'arrow-down'
                    };
                }
            } catch (err) {
                console.error("Error getting comparison indicator:", err);
                return null;
            }
        };

        // --- 4. KOMPONEN VISUALISASI KARTU METRIK PREMIUM ---
        const DashboardView = ({ title, kpis, comparisonTargetKPIs, isComparing, filtersA, filtersB }) => {
            
            const isTimeCompare = useMemo(() => {
                try {
                    if (!isComparing) return false;
                    if (filtersA.provinsi !== filtersB.provinsi || filtersA.kabupaten !== filtersB.kabupaten) return false;
                    if (JSON.stringify(filtersA.tahun) !== JSON.stringify(filtersB.tahun)) return true;
                    return false;
                } catch (err) {
                    console.error("Error in isTimeCompare memo:", err);
                    return false;
                }
            }, [isComparing, filtersA, filtersB]);

            const MetricCard = ({ label, value, percentage, unit, compValue, iconName, themeGradient }) => {
                let compInfo = null;
                try {
                    if (isComparing && compValue !== undefined) {
                        const compareVal = percentage !== undefined ? percentage : value;
                        compInfo = getComparisonIndicator(Number(compValue), Number(compareVal), isTimeCompare);
                    }
                } catch (err) {
                    console.error("Error formatting metric card:", err);
                }

                const formattedValue = formatIntegerID(value);
                const formattedPercentage = percentage !== undefined ? formatDecimalID(percentage, 2) : undefined;

                return (
                    <div className="glass-panel p-6 rounded-3xl flex flex-col relative overflow-hidden group hover:-translate-y-1.5 duration-300 hover:shadow-2xl dark:hover:shadow-indigo-500/5 hover:border-indigo-500/25 dark:hover:border-indigo-400/25 h-full">
                        {/* Soft Glow Radial Background on Hover */}
                        <div className={`absolute -right-6 -top-6 w-24 h-24 rounded-full opacity-5 dark:opacity-[0.08] blur-2xl group-hover:opacity-15 duration-500 bg-gradient-to-br ${themeGradient}`}></div>
                        
                        <div className="flex justify-between items-start mb-4">
                            <span className="text-slate-400 dark:text-slate-400 text-xs font-bold uppercase tracking-widest leading-normal">{label}</span>
                            {iconName && (
                                <div className={`p-2.5 rounded-xl bg-gradient-to-br ${themeGradient} text-white flex items-center justify-center shadow-lg shadow-indigo-500/10 dark:shadow-indigo-500/2`}>
                                    <Icon name={iconName} className="w-5 h-5" />
                                </div>
                            )}
                        </div>
                        
                        <div className="flex items-baseline gap-2 mt-auto">
                            <span className="text-4xl font-extrabold tracking-tight text-slate-800 dark:text-white group-hover:scale-[1.01] transition-transform duration-300">{formattedValue}</span>
                            <span className="text-sm text-slate-400 dark:text-slate-500 font-semibold">{unit}</span>
                            {percentage !== undefined && (
                                <span className="text-xl font-bold text-emerald-600 dark:text-emerald-400 ml-1.5">({formattedPercentage}%)</span>
                            )}
                        </div>
                        
                        {compInfo && (
                            <div className="mt-4 pt-3.5 border-t border-slate-200/50 dark:border-slate-800/60 flex items-center justify-between text-xs font-bold">
                                <span className="text-slate-400 dark:text-slate-500">Selisih vs Kriteria A</span>
                                <div className={`px-2.5 py-1 rounded-lg flex items-center gap-1 ${compInfo.color}`}>
                                    <Icon name={compInfo.icon} className="w-3.5 h-3.5" />
                                    <span>{compInfo.text} {percentage !== undefined ? '%' : unit}</span>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="flex-1 flex flex-col gap-5 mt-2">
                    {title && (
                        <h3 className="text-xl font-extrabold tracking-tight text-slate-800 dark:text-white mb-1 pl-1 flex items-center gap-2">
                            <span className="w-1.5 h-6 rounded-full bg-indigo-500"></span>
                            {title}
                        </h3>
                    )}
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                        <MetricCard 
                            label="Total TPP" 
                            iconName="database" 
                            value={kpis.total} 
                            unit="Unit" 
                            compValue={comparisonTargetKPIs?.total} 
                            themeGradient="from-indigo-500 to-blue-600"
                        />
                        <MetricCard 
                            label="Memenuhi Syarat Inspeksi Kesling" 
                            iconName="check-circle" 
                            value={kpis.valIKL} 
                            percentage={kpis.pctIKL} 
                            unit="Unit" 
                            compValue={comparisonTargetKPIs?.pctIKL} 
                            themeGradient="from-emerald-500 to-teal-600"
                        />
                        <MetricCard 
                            label="Memenuhi Syarat Peningkatan Kapasitas" 
                            iconName="bar-chart-2" 
                            value={kpis.valKapasitas} 
                            percentage={kpis.pctKapasitas} 
                            unit="Unit" 
                            compValue={comparisonTargetKPIs?.pctKapasitas} 
                            themeGradient="from-amber-500 to-orange-600"
                        />
                        <MetricCard 
                            label="Memenuhi Syarat Pemeriksaan Pangan" 
                            iconName="shield" 
                            value={kpis.valPangan} 
                            percentage={kpis.pctPangan} 
                            unit="Unit" 
                            compValue={comparisonTargetKPIs?.pctPangan} 
                            themeGradient="from-purple-500 to-fuchsia-600"
                        />
                        <MetricCard 
                            label="TPP Memenuhi Syarat" 
                            iconName="award" 
                            value={kpis.valTPP} 
                            percentage={kpis.pctTPP} 
                            unit="Unit" 
                            compValue={comparisonTargetKPIs?.pctTPP} 
                            themeGradient="from-rose-500 to-pink-600"
                        />
                    </div>
                </div>
            );
        };

        // --- 5. KOMPONEN UTAMA (APP) ---
        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);
            const [lastSyncTime, setLastSyncTime] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(true);

            const initialFilterState = {
                tahun: [], provinsi: '', kabupaten: '', kecamatan: '', puskesmas: '',
                jenisTPP: '', statusIKL: [], statusKapasitas: [], statusPangan: []
            };

            const [isComparing, setIsComparing] = useState(false);
            const [filtersA, setFiltersA] = useState(initialFilterState);
            const [filtersB, setFiltersB] = useState(initialFilterState);

            useEffect(() => {
                try {
                    if (isDarkMode) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                } catch (e) {
                    console.error("Theme Error:", e);
                }
            }, [isDarkMode]);

            useEffect(() => {
                const fetchGoogleSheetData = async () => {
                    setIsLoading(true);
                    setError(null);
                    try {
                        const sheetId = "18U79MD3TdLgD5ruO42odAr8aIH34XxL23Jf-C9qhy7c";
                        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

                        Papa.parse(csvUrl, {
                            download: true,
                            header: true,
                            skipEmptyLines: true,
                            complete: (results) => {
                                try {
                                    if (results.errors.length > 0 && results.data.length === 0) {
                                        throw new Error("Gagal membaca struktur CSV.");
                                    }

                                    // Transformasi data berbasis nama kolom serta konversi format Title Case
                                    const parsedData = results.data.map((row, index) => {
                                        const keys = Object.keys(row);
                                        const rawTahun = row[keys[1]] ? row[keys[1]].trim() : '';
                                        const yearMatch = rawTahun.match(/\b(20\d{2})\b/);
                                        const extractedTahun = yearMatch ? yearMatch[1] : rawTahun;

                                        return {
                                            id: index,
                                            tahun: extractedTahun,
                                            provinsi: row[keys[2]] ? toTitleCase(row[keys[2]].trim()) : '',
                                            kabupaten: row[keys[3]] ? toTitleCase(row[keys[3]].trim()) : '',
                                            text: row[keys[4]] ? toTitleCase(row[keys[4]].trim()) : '',
                                            kecamatan: row[keys[4]] ? toTitleCase(row[keys[4]].trim()) : '',
                                            puskesmas: row[keys[7]] ? toTitleCase(row[keys[7]].trim()) : '',
                                            
                                            jenisTPP: row[keys[8]] ? row[keys[8]].trim() : '',
                                            statusIKL: row[keys[21]] ? row[keys[21]].trim() : '',
                                            statusKapasitas: row[keys[22]] ? row[keys[22]].trim() : '',
                                            statusPangan: row[keys[23]] ? row[keys[23]].trim() : '',
                                            statusTPP: row[keys[25]] ? row[keys[25]].trim() : '',
                                        };
                                    }).filter(item => item.provinsi !== '' || item.tahun !== '');

                                    setRawData(parsedData);
                                    
                                    const now = new Date();
                                    setLastSyncTime(now.toLocaleString('id-ID', { dateStyle: 'full', timeStyle: 'long' }));
                                    
                                    setIsLoading(false);
                                } catch (parseError) {
                                    console.error("Parse Error Details:", parseError);
                                    setError("Gagal memproses susunan data: " + parseError.message);
                                    setIsLoading(false);
                                }
                            },
                            error: (err) => {
                                console.error("PapaParse Network Error:", err);
                                setError("Gagal mengunduh data dari Google Sheet. Pastikan akses Bagikan diatur ke 'Siapa saja yang memiliki link'.");
                                setIsLoading(false);
                            }
                        });
                    } catch (err) {
                        console.error("System Error:", err);
                        setError("Terjadi kesalahan sistem internal: " + err.message);
                        setIsLoading(false);
                    }
                };

                fetchGoogleSheetData();
            }, []);

            const filteredDataA = useMemo(() => applyFilters(rawData, filtersA), [rawData, filtersA]);
            const filteredDataB = useMemo(() => applyFilters(rawData, filtersB), [rawData, filtersB]);

            const kpisA = useMemo(() => calculateKPIs(filteredDataA), [filteredDataA]);
            const kpisB = useMemo(() => calculateKPIs(filteredDataB), [filteredDataB]);

            if (isLoading) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-[#060913] text-white">
                        <div className="spinner-ring mb-6">
                            <div></div><div></div><div></div>
                        </div>
                        <h2 className="text-xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 pulse-text">
                            Terhubung dengan Google Sheet
                        </h2>
                        <p className="text-slate-500 text-sm mt-1.5 font-medium tracking-wide">Sinkronisasi data</p>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center">
                        <div className="glass-panel p-8 rounded-3xl max-w-lg border border-rose-500/20 dark:border-rose-500/30 shadow-2xl">
                            <div className="w-16 h-16 bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg shadow-rose-500/5">
                                <Icon name="alert-triangle" className="w-8 h-8" />
                            </div>
                            <h2 className="text-2xl font-extrabold text-slate-800 dark:text-white mb-2 tracking-tight">Akses Data Gagal</h2>
                            <p className="text-slate-500 dark:text-slate-400 text-sm mb-6 font-medium leading-relaxed">{error}</p>
                            <p className="text-slate-600 dark:text-slate-300 text-xs text-left bg-rose-50/50 dark:bg-black/30 p-5 rounded-2xl border border-rose-100 dark:border-rose-950/40 leading-relaxed shadow-inner">
                                <b className="text-rose-600 dark:text-rose-400 font-bold block mb-1">💡 Solusi Cepat:</b> Buka link Google Sheet Anda, klik tombol "Bagikan" (Share) di pojok kanan atas, lalu ubah Akses Umum dari "Dibatasi" menjadi <b>"Siapa saja yang memiliki link"</b> (Anyone with the link). Kemudian muat ulang halaman ini.
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 md:p-8 max-w-screen-2xl mx-auto min-h-screen transition-colors duration-500 slide-up">
                    
                    {/* Header Kontainer Utama (Premium Glassmorphism Header) */}
                    <div className="flex flex-col mb-8 bg-white/40 dark:bg-slate-900/40 p-6 rounded-3xl backdrop-blur-md border border-slate-200/60 dark:border-white/5 shadow-xl shadow-slate-100/30 dark:shadow-black/10 gap-5 relative overflow-hidden group">
                        {/* Ambient glow decoration */}
                        <div className="absolute -top-32 -left-32 w-64 h-64 bg-indigo-500/5 dark:bg-indigo-500/10 rounded-full blur-3xl pointer-events-none group-hover:scale-125 duration-700"></div>
                        <div className="absolute -bottom-32 -right-32 w-64 h-64 bg-emerald-500/5 dark:bg-emerald-500/5 rounded-full blur-3xl pointer-events-none group-hover:scale-125 duration-700"></div>

                        <div className="relative z-10">
                            <h1 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-emerald-500 dark:from-indigo-400 dark:via-purple-400 dark:to-emerald-400 flex items-center tracking-tight leading-none">
                                <span className="p-2 bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-2xl shadow-lg shadow-indigo-500/20 mr-3.5 flex items-center justify-center">
                                    <Icon name="layout-dashboard" className="w-7 h-7" />
                                </span>
                                Data TPP untuk FSVA
                            </h1>
                            <div className="mt-2.5">
                                <p className="text-slate-400 dark:text-slate-400 text-xs flex items-center font-semibold tracking-wider uppercase">
                                    <Icon name="clock" className="w-3.5 h-3.5 mr-1.5 text-indigo-500" /> Sinkronisasi Google Sheet: {lastSyncTime}
                                </p>
                            </div>
                        </div>

                        {/* Baris Tombol Aksi - Selalu satu baris di bawah informasi sinkronisasi */}
                        <div className="flex flex-wrap items-center gap-3.5 pt-4.5 border-t border-slate-200/60 dark:border-slate-800/60 relative z-10">
                            
                            {/* Tombol 1: Buka Spreadsheet */}
                            <a 
                                href="https://docs.google.com/spreadsheets/d/18U79MD3TdLgD5ruO42odAr8aIH34XxL23Jf-C9qhy7c/edit?usp=sharing" 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="flex items-center justify-center gap-2 px-4.5 py-2.5 text-sm font-bold rounded-xl bg-white dark:bg-slate-800/80 text-slate-700 dark:text-slate-200 border border-slate-200/80 dark:border-slate-700/80 hover:border-emerald-500 dark:hover:border-emerald-400/50 hover:bg-emerald-500/[0.04] dark:hover:bg-emerald-500/[0.04] transition-all duration-300 shadow-sm active:scale-95"
                                title="Buka Google Sheet"
                            >
                                <Icon name="external-link" className="w-4 h-4 text-emerald-500" />
                                <span className="hidden sm:inline">Buka Spreadsheet</span>
                            </a>

                            {/* Tombol 2: Ubah Tema */}
                            <button 
                                onClick={() => {
                                    try {
                                        setIsDarkMode(!isDarkMode)
                                    } catch(err) {
                                        console.error("Theme toggle error:", err);
                                    }
                                }}
                                className="flex items-center justify-center gap-2 px-4.5 py-2.5 text-sm font-bold rounded-xl bg-white dark:bg-slate-800/80 text-slate-700 dark:text-slate-200 border border-slate-200/80 dark:border-slate-700/80 hover:border-amber-500 dark:hover:border-yellow-400/50 hover:bg-amber-500/[0.04] dark:hover:bg-yellow-400/[0.04] transition-all duration-300 shadow-sm active:scale-95"
                                title={isDarkMode ? "Beralih ke Mode Terang" : "Beralih ke Mode Gelap"}
                            >
                                <Icon name={isDarkMode ? "sun" : "moon"} className="w-4 h-4 text-amber-500 dark:text-yellow-400" />
                                <span className="hidden sm:inline">{isDarkMode ? 'Mode Terang' : 'Mode Gelap'}</span>
                            </button>

                            {/* Tombol 3: Bandingkan Kriteria */}
                            <button 
                                onClick={() => {
                                    try {
                                        setIsComparing(!isComparing);
                                    } catch(err) {
                                        console.error("Compare toggle error:", err);
                                    }
                                }}
                                className={`flex items-center justify-center gap-2 px-4.5 py-2.5 text-sm font-bold rounded-xl transition-all duration-300 shadow-sm active:scale-95 ${
                                    isComparing 
                                        ? 'bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white shadow-lg shadow-indigo-500/20 border-transparent' 
                                        : 'bg-white dark:bg-slate-800/80 text-slate-700 dark:text-slate-200 border border-slate-200/80 dark:border-slate-700/80 hover:border-indigo-500 dark:hover:border-indigo-400/50 hover:bg-indigo-500/[0.04] dark:hover:bg-indigo-400/[0.04]'
                                }`}
                                title={isComparing ? "Tutup Perbandingan" : "Bandingkan Kriteria"}
                            >
                                <Icon name="git-compare" className="w-4 h-4 text-indigo-500 dark:text-indigo-400 group-hover:rotate-18) duration-500" />
                                <span className="hidden sm:inline">{isComparing ? 'Tutup Perbandingan' : 'Bandingkan Kriteria'}</span>
                            </button>

                        </div>
                    </div>

                    {/* Area Konten Utama Dashboard */}
                    <div className="flex flex-col lg:flex-row gap-8">
                        {/* Kolom A */}
                        <div className={`flex-1 flex flex-col transition-all duration-500 ${isComparing ? 'w-full lg:w-1/2' : 'w-full'}`}>
                            <FilterGroup 
                                data={rawData} 
                                filters={filtersA} 
                                setFilters={setFiltersA} 
                                title={isComparing ? "Kriteria A" : "Filter Data TPP"} 
                            />
                            <DashboardView 
                                title={isComparing ? "Hasil Kriteria A" : null} 
                                kpis={kpisA}
                                isComparing={false} 
                            />
                        </div>

                        {/* Kolom B */}
                        {isComparing && (
                            <div className="flex-1 flex flex-col border-t lg:border-t-0 lg:border-l border-slate-200/80 dark:border-slate-800/80 pt-8 lg:pt-0 lg:pl-8 transition-all duration-500 fade-enter-active">
                                <FilterGroup 
                                    data={rawData} 
                                    filters={filtersB} 
                                    setFilters={setFiltersB} 
                                    title="Kriteria B (Pembanding)" 
                                />
                                <DashboardView 
                                    title="Hasil Kriteria B vs A" 
                                    kpis={kpisB}
                                    comparisonTargetKPIs={kpisA}
                                    isComparing={true}
                                    filtersA={filtersA}
                                    filtersB={filtersB}
                                />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
