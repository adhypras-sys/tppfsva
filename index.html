                                    <tr className="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider">
                                        <th className="p-4 font-bold border-b border-slate-200 dark:border-slate-700/80 w-12 text-center">No.</th>
                                        
                                        <th className="p-4 font-bold border-b border-slate-200 dark:border-slate-700/80 cursor-pointer group hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors select-none" onClick=${() => requestSort('namaTPP')}>
                                            <div className="flex items-center">Nama TPP ${getSortIcon('namaTPP')}</div>
                                        </th>
                                        
                                        <th className="p-4 font-bold border-b border-slate-200 dark:border-slate-700/80 cursor-pointer group hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors select-none" onClick=${() => requestSort('statusIKL')}>
                                            <div className="flex items-center">Inspeksi Kesling ${getSortIcon('statusIKL')}</div>
                                        </th>
                                        
                                        <th className="p-4 font-bold border-b border-slate-200 dark:border-slate-700/80 cursor-pointer group hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors select-none" onClick=${() => requestSort('statusKapasitas')}>
                                            <div className="flex items-center">Peningkatan Kapasitas ${getSortIcon('statusKapasitas')}</div>
                                        </th>
                                        
                                        <th className="p-4 font-bold border-b border-slate-200 dark:border-slate-700/80 cursor-pointer group hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors select-none" onClick=${() => requestSort('statusPangan')}>
                                            <div className="flex items-center">Pemeriksaan Pangan ${getSortIcon('statusPangan')}</div>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-200 dark:divide-slate-700/80">
                                    ${sortedData && sortedData.length > 0 ? sortedData.map((row, idx) => html`
                                        <tr key=${idx} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                                            <td className="p-4 text-sm font-semibold text-slate-500 dark:text-slate-400 text-center border-r border-slate-100 dark:border-slate-700/50">${idx + 1}</td>
                                            <td className="p-4 text-sm font-semibold text-slate-700 dark:text-slate-200 max-w-[200px] sm:max-w-xs truncate" title=${row.namaTPP || '-'}>
                                                ${row.namaTPP || '-'}
                                            </td>
                                            <td className="p-4"><${StatusBadge} text=${row.statusIKL} /></td>
                                            <td className="p-4"><${StatusBadge} text=${row.statusKapasitas} /></td>
                                            <td className="p-4"><${StatusBadge} text=${row.statusPangan} /></td>
                                        </tr>
                                    `) : html`
                                        <tr>
                                            <td colSpan="5" className="p-8 text-center text-slate-400 text-sm font-medium">
                                                Tidak ada data TPP pada kriteria dan wilayah ini.
                                            </td>
                                        </tr>
                                    `}
                                </tbody>
                            </table>
                        </div>
                    `}
                </div>
            `;
        };

        // --- 6. KOMPONEN ROOT (APP) ---
        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);
            const [lastSyncTime, setLastSyncTime] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(false); 
            const [activeDropdown, setActiveDropdown] = useState(null);
            
            // Komponen Modal Share
            const [showShareModal, setShowShareModal] = useState(false);
            const [shareUrl, setShareUrl] = useState('');

            const [toastMsg, setToastMsg] = useState(null);

            const showToast = (msg) => {
                try {
                    setToastMsg(msg);
                    setTimeout(() => setToastMsg(null), 3500);
                } catch(e) {}
            };

            const initialFilterState = {
                tahun: [], provinsi: '', kabupaten: '', kecamatan: '', puskesmas: '',
                jenisTPP: '', statusIKL: [], statusKapasitas: [], statusPangan: []
            };

            const [isComparing, setIsComparing] = useState(false);
            const [filtersA, setFiltersA] = useState(initialFilterState);
            const [filtersB, setFiltersB] = useState(initialFilterState);

            // Fungsi Kompresi Data Filter ke dalam Hash URL menggunakan LZ-String
            const compressState = (state) => {
                try {
                    return LZString.compressToEncodedURIComponent(JSON.stringify(state));
                } catch(e) { return ''; }
            };

            const decompressState = (hashStr) => {
                try {
                    return JSON.parse(LZString.decompressFromEncodedURIComponent(hashStr));
                } catch(e) { return null; }
            };

            // Efek untuk memuat state dari URL Hash
            useEffect(() => {
                try {
                    const hash = window.location.hash;
                    if (hash && hash.length > 1) {
                        const cleanHash = hash.substring(1); // tanpa decodeURIComponent karena LZString menanganinya
                        const state = decompressState(cleanHash);
                        
                        if (state && typeof state === 'object') {
                            if (state.filtersA) setFiltersA(state.filtersA);
                            if (state.filtersB) setFiltersB(state.filtersB);
                            if (typeof state.isComparing === 'boolean') setIsComparing(state.isComparing);
                            showToast("Visualisasi berhasil diselaraskan dari tautan.");
                        }
                    }
                } catch (e) {}
            }, []);

            // Efek untuk menyimpan state ke URL Hash saat data berubah
            useEffect(() => {
                try {
                    if (rawData.length > 0) {
                        const state = { filtersA, filtersB, isComparing };
                        const compressed = compressState(state);
                        const newHashString = `#${compressed}`;
                        if (window.location.hash !== newHashString) {
                            window.history.replaceState(null, '', newHashString);
                        }
                    }
                } catch(e) { console.error("URL Hash error:", e); }
            }, [filtersA, filtersB, isComparing, rawData]);

            // Handler ketika tombol Bagikan ditekan
            const handleShareLinkClick = () => {
                try {
                    const currentUrl = window.location.href;
                    setShareUrl(currentUrl);
                    setShowShareModal(true);
                } catch (err) { showToast("Gagal memproses tautan."); }
            };

            useEffect(() => {
                try {
                    if (isDarkMode) document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                } catch (e) {}
            }, [isDarkMode]);

            useEffect(() => {
                let isMounted = true;

                const fetchGoogleSheetData = async () => {
                    setIsLoading(true);
                    setError(null);
                    try {
                        const sheetId = "18U79MD3TdLgD5ruO42odAr8aIH34XxL23Jf-C9qhy7c";
                        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

                        const response = await fetch(csvUrl, { cache: 'no-store' });
                        if (!response.ok) throw new Error(`Status HTTP tidak valid: ${response.status}`);
                        const csvText = await response.text();

                        if (!isMounted) return;

                        Papa.parse(csvText, {
                            header: false, 
                            skipEmptyLines: true,
                            complete: (results) => {
                                try {
                                    if (!isMounted) return;
                                    
                                    if (results.errors.length > 0 && (!results.data || results.data.length <= 1)) {
                                        throw new Error("Gagal membaca struktur atau data CSV kosong.");
                                    }

                                    const dataRows = results.data.slice(1);

                                    const indices = {
                                        tahun: 1,
                                        provinsi: 2,
                                        kabupaten: 3,
                                        kecamatan: 4,
                                        puskesmas: 7,
                                        jenisTPP: 8,
                                        namaTPP: 9,
                                        tglSLHS: 19,
                                        slhsKadaluarsa: 20,
                                        statusIKL: 21,
                                        statusKapasitas: 22,
                                        statusPangan: 23,
                                        statusTPP: 25
                                    };

                                    const parsedData = dataRows.map((row, index) => {
                                        const safeGet = (colIdx) => {
                                            try {
                                                return (row && row[colIdx] !== undefined && row[colIdx] !== null) 
                                                    ? String(row[colIdx]).trim() : '';
                                            } catch (e) { return ''; }
                                        };
                                        
                                        const rawTahun = safeGet(indices.tahun);
                                        const yearMatch = rawTahun.match(/\b(20\d{2})\b/);
                                        const extractedTahun = yearMatch ? yearMatch[1] : rawTahun;

                                        return {
                                            id: index, 
                                            tahun: extractedTahun,
                                            provinsi: toTitleCase(safeGet(indices.provinsi)), 
                                            kabupaten: toTitleCase(safeGet(indices.kabupaten)),
                                            kecamatan: toTitleCase(safeGet(indices.kecamatan)), 
                                            puskesmas: toTitleCase(safeGet(indices.puskesmas)),
                                            jenisTPP: safeGet(indices.jenisTPP), 
                                            namaTPP: safeGet(indices.namaTPP),
                                            tglSLHS: safeGet(indices.tglSLHS),
                                            slhsKadaluarsa: safeGet(indices.slhsKadaluarsa),
                                            statusIKL: safeGet(indices.statusIKL),
                                            statusKapasitas: safeGet(indices.statusKapasitas), 
                                            statusPangan: safeGet(indices.statusPangan),
                                            statusTPP: safeGet(indices.statusTPP),
                                        };
                                    }).filter(item => item.provinsi !== '' || item.tahun !== '');

                                    if (parsedData.length === 0) throw new Error("Tidak ada data yang berhasil diekstrak dari Google Sheet.");

                                    setRawData(parsedData);
                                    setLastSyncTime(formatSyncTimeStr());
                                    setIsLoading(false);
                                } catch (parseError) {
                                    if (isMounted) {
                                        setError("Kendala validasi susunan matriks: " + parseError.message);
                                        setIsLoading(false);
                                    }
                                }
                            },
                            error: (err) => {
                                if (isMounted) {
                                    setError("Koneksi gagal. Pastikan dokumen diatur ke 'Siapa saja yang memiliki link'.");
                                    setIsLoading(false);
                                }
                            }
                        });
                    } catch (err) {
                        if (isMounted) {
                            setError("Jaringan gagal: " + err.message);
                            setIsLoading(false);
                        }
                    }
                };

                fetchGoogleSheetData();

                const fallbackTimeout = setTimeout(() => {
                    if (isMounted) {
                        setIsLoading(prev => {
                            if (prev) {
                                setError("Waktu tunggu pemuatan habis (Timeout 30s). Periksa koneksi internet Anda atau coba muat ulang.");
                                return false; 
                            }
                            return prev;
                        });
                    }
                }, 30000);

                return () => {
                    isMounted = false;
                    clearTimeout(fallbackTimeout);
                };
            }, []);

            const filteredDataA = useMemo(() => applyFilters(rawData, filtersA), [rawData, filtersA]);
            const filteredDataB = useMemo(() => applyFilters(rawData, filtersB), [rawData, filtersB]);

            const kpisA = useMemo(() => calculateKPIs(filteredDataA, filtersA), [filteredDataA, filtersA]);
            const kpisB = useMemo(() => calculateKPIs(filteredDataB, filtersB), [filteredDataB, filtersB]);

            const chartDataA = useMemo(() => calculateChartData(filteredDataA), [filteredDataA]);
            const chartDataB = useMemo(() => calculateChartData(filteredDataB), [filteredDataB]);

            const barChartDataA = useMemo(() => calculateBarChartData(filteredDataA), [filteredDataA]);
            const barChartDataB = useMemo(() => calculateBarChartData(filteredDataB), [filteredDataB]);

            if (isLoading) {
                return html`
                    <div className="flex flex-col items-center justify-center min-h-[100dvh] bg-[#f8fafc] text-slate-800 dark:bg-[#060913] dark:text-white">
                        <div className="spinner-ring mb-6 scale-90 sm:scale-100">
                            <div></div><div></div><div></div>
                        </div>
                        <h2 className="text-lg sm:text-xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 dark:from-indigo-400 dark:to-purple-400 pulse-text px-4 text-center">
                            Sinkronisasi Data
                        </h2>
                        <p className="text-slate-500 text-xs sm:text-sm mt-2 font-medium tracking-wide">Terhubung dengan Google Sheet</p>
                    </div>
                `;
            }

            if (error) {
                return html`
                    <div className="flex flex-col items-center justify-center min-h-[100dvh] p-4 text-center">
                        <div className="glass-panel p-6 sm:p-8 rounded-3xl max-w-lg border border-rose-500/20 dark:border-rose-500/30 shadow-2xl mx-auto w-full animate-fade-in-up">
                            <div className="w-14 h-14 sm:w-16 sm:h-16 bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-5 shadow-lg shadow-rose-500/5">
                                <${Icon} name="alert-triangle" className="w-7 h-7 sm:w-8 sm:h-8" />
                            </div>
                            <h2 className="text-xl sm:text-2xl font-extrabold text-slate-800 dark:text-white mb-2 tracking-tight">Akses Data Gagal</h2>
                            <p className="text-slate-500 dark:text-slate-400 text-sm mb-6 font-medium leading-relaxed">${error}</p>
                            <div className="text-slate-600 dark:text-slate-300 text-xs sm:text-sm text-left bg-rose-50/50 dark:bg-black/30 p-4 sm:p-5 rounded-2xl border border-rose-100 dark:border-rose-950/40 leading-relaxed shadow-inner">
                                <b className="text-rose-600 dark:text-rose-400 font-bold block mb-1">💡 Solusi Cepat:</b> Buka tautan Google Sheet Anda, klik tombol "Bagikan" (Share) di pojok kanan atas, lalu pastikan Akses Umum adalah <b>"Siapa saja yang memiliki link"</b>. Kemudian muat ulang halaman.
                            </div>
                        </div>
                    </div>
                `;
            }

            return html`
                <div className="p-3 pb-safe sm:p-4 md:p-8 max-w-[1600px] mx-auto min-h-screen transition-colors duration-500 slide-up relative animate-fade-in-up">
                    
                    ${toastMsg && html`
                        <div className="fixed bottom-8 right-4 sm:right-8 z-50 max-w-sm sm:max-w-md px-5 py-4 rounded-2xl glass-panel border-indigo-500/30 dark:border-indigo-400/40 shadow-2xl bg-white/95 dark:bg-slate-900/95 flex items-center gap-3 animate-bounce">
                            <div className="p-2 rounded-xl bg-indigo-500 text-white flex items-center justify-center shrink-0">
                                <${Icon} name="info" className="w-4 h-4" />
                            </div>
                            <span className="text-sm font-semibold text-slate-700 dark:text-slate-200 leading-snug">${toastMsg}</span>
                        </div>
                    `}
                    
                    <${ShareCard} 
                        isOpen=${showShareModal} 
                        onClose=${() => setShowShareModal(false)} 
                        url=${shareUrl} 
                        showToast=${showToast} 
                    />

                    <header className="flex flex-col mb-6 sm:mb-8 bg-white/40 dark:bg-slate-900/40 p-5 sm:p-6 rounded-3xl backdrop-blur-md border border-slate-200/60 dark:border-white/5 shadow-xl shadow-slate-100/30 dark:shadow-black/10 gap-5 relative overflow-hidden group">
                        <div className="absolute -top-32 -left-32 w-64 h-64 bg-indigo-500/5 dark:bg-indigo-500/10 rounded-full blur-3xl pointer-events-none group-hover:scale-125 duration-700"></div>
                        <div className="absolute -bottom-32 -right-32 w-64 h-64 bg-emerald-500/5 dark:bg-emerald-500/5 rounded-full blur-3xl pointer-events-none group-hover:scale-125 duration-700"></div>

                        <div className="relative z-10 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                            <div>
                                <h1 className="text-2xl sm:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-emerald-500 dark:from-indigo-400 dark:via-purple-400 dark:to-emerald-400 flex items-center tracking-tight leading-tight">
                                    <span className="p-2 bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-xl sm:rounded-2xl shadow-lg shadow-indigo-500/20 mr-3 flex items-center justify-center shrink-0">
                                        <${Icon} name="layout-dashboard" className="w-6 h-6 sm:w-7 sm:h-7" />
                                    </span>
                                    Data TPP untuk FSVA
                                </h1>
                                <div className="mt-3 sm:mt-2.5">
                                    <p className="text-slate-500 dark:text-slate-400 text-xs flex items-center font-semibold tracking-wider">
                                        <${Icon} name="clock" className="w-3.5 h-3.5 mr-1.5 text-indigo-500 shrink-0" /> 
                                        <span className="truncate">Sinkronisasi: ${lastSyncTime}</span>
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-row flex-wrap items-center justify-between sm:justify-start gap-2 sm:gap-3 pt-4 border-t border-slate-200/60 dark:border-slate-800/60 relative z-10 no-print">
                            
                            <a 
                                href="https://docs.google.com/spreadsheets/d/18U79MD3TdLgD5ruO42odAr8aIH34XxL23Jf-C9qhy7c/edit?usp=sharing" 
                                target="_blank" rel="noopener noreferrer" 
                                className="flex-1 sm:flex-none sm:w-auto flex items-center justify-center gap-2 p-3 sm:px-4 sm:py-2.5 min-h-[44px] text-sm font-bold rounded-xl bg-white dark:bg-slate-800/80 text-slate-700 dark:text-slate-200 border border-slate-200/80 dark:border-slate-700/80 hover:border-emerald-500 dark:hover:border-emerald-400/50 hover:bg-emerald-500/[0.04] dark:hover:bg-emerald-500/[0.04] transition-all duration-300 shadow-sm active:scale-95"
                            >
                                <${Icon} name="external-link" className="w-5 h-5 sm:w-4 sm:h-4 text-emerald-500 shrink-0" />
                                <span className="hidden sm:inline">Buka Spreadsheet</span>
                            </a>

                            <button 
                                onClick=${() => { try { setIsDarkMode(!isDarkMode) } catch(err){} }}
                                className="flex-1 sm:flex-none sm:w-auto flex items-center justify-center gap-2 p-3 sm:px-4 sm:py-2.5 min-h-[44px] text-sm font-bold rounded-xl bg-white dark:bg-slate-800/80 text-slate-700 dark:text-slate-200 border border-slate-200/80 dark:border-slate-700/80 hover:border-amber-500 dark:hover:border-yellow-400/50 hover:bg-amber-500/[0.04] dark:hover:bg-yellow-400/[0.04] transition-all duration-300 shadow-sm active:scale-95"
                            >
                                <${Icon} name=${isDarkMode ? "sun" : "moon"} className="w-5 h-5 sm:w-4 sm:h-4 text-amber-500 dark:text-yellow-400 shrink-0" />
                                <span className="hidden sm:inline">${isDarkMode ? 'Mode Terang' : 'Mode Gelap'}</span>
                            </button>

                            <button 
                                onClick=${handleShareLinkClick}
                                className="flex-1 sm:flex-none sm:w-auto flex items-center justify-center gap-2 p-3 sm:px-4 sm:py-2.5 min-h-[44px] text-sm font-bold rounded-xl bg-white dark:bg-slate-800/80 text-slate-700 dark:text-slate-200 border border-slate-200/80 dark:border-slate-700/80 hover:border-indigo-500 dark:hover:border-indigo-400/50 hover:bg-indigo-500/[0.04] dark:hover:bg-indigo-400/[0.04] transition-all duration-300 shadow-sm active:scale-95"
                            >
                                <${Icon} name="share-2" className="w-5 h-5 sm:w-4 sm:h-4 text-indigo-500 dark:text-indigo-400 shrink-0" />
                                <span className="hidden sm:inline">Bagikan Tampilan</span>
                            </button>

                            <button 
                                onClick=${() => { try { setIsComparing(!isComparing); } catch(err){} }}
                                className=${`flex-1 sm:flex-none sm:w-auto flex items-center justify-center gap-2 p-3 sm:px-4 sm:py-2.5 min-h-[44px] text-sm font-bold rounded-xl transition-all duration-300 shadow-sm active:scale-95 ${
                                    isComparing 
                                        ? 'bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white shadow-lg shadow-indigo-500/20 border-transparent' 
                                        : 'bg-white dark:bg-slate-800/80 text-slate-700 dark:text-slate-200 border border-slate-200/80 dark:border-slate-700/80 hover:border-indigo-500 dark:hover:border-indigo-400/50 hover:bg-indigo-500/[0.04] dark:hover:bg-indigo-400/[0.04]'
                                }`}
                            >
                                <${Icon} name="git-compare" className=${`w-5 h-5 sm:w-4 sm:h-4 shrink-0 ${isComparing ? 'text-white' : 'text-indigo-500 dark:text-indigo-400'} group-hover:rotate-180 duration-500`} />
                                <span className="hidden sm:inline">${isComparing ? 'Tutup Pembanding' : 'Bandingkan Kriteria'}</span>
                            </button>

                        </div>
                    </header>

                    <div className="flex flex-col lg:flex-row gap-6 sm:gap-8 pb-10">
                        <div className=${`flex-1 flex flex-col transition-all duration-500 ${isComparing ? 'w-full lg:w-1/2 print-full-width' : 'w-full'}`}>
                            
                            <!-- BAGIAN 1: Filter Data TPP -->
                            <div className="no-print">
                                <${FilterGroup} 
                                    data=${rawData} filters=${filtersA} setFilters=${setFiltersA} 
                                    title=${isComparing ? "Kriteria A" : "Filter Data TPP"} 
                                    activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown} prefixId="fA"
                                />
                            </div>
                            
                            <!-- BAGIAN 2, 3, 4 terbungkus dalam DashboardView -->
                            <${DashboardView} 
                                title=${isComparing ? "Hasil Kriteria A" : "Rekapitulasi Data TPP"} 
                                kpis=${kpisA} 
                                chartData=${chartDataA} 
                                barChartData=${barChartDataA}
                                isComparing=${false} 
                                isDarkMode=${isDarkMode} 
                            />
                            
                            <!-- BAGIAN 5: Tabel Data TPP -->
                            ${filtersA.kecamatan && html`
                                <${DataTable} data=${filteredDataA} title=${isComparing ? "Daftar TPP - Kriteria A" : `Daftar TPP di Kecamatan ${filtersA.kecamatan}`} />
                            `}
                        </div>

                        ${isComparing && html`
                            <div className="flex-1 flex flex-col border-t lg:border-t-0 lg:border-l border-slate-200/80 dark:border-slate-800/80 pt-8 lg:pt-0 lg:pl-8 transition-all duration-500 animate-fade-in-up print-full-width">
                                <div className="no-print">
                                    <${FilterGroup} 
                                        data=${rawData} filters=${filtersB} setFilters=${setFiltersB} 
                                        title="Kriteria B (Pembanding)" 
                                        activeDropdown=${activeDropdown} setActiveDropdown=${setActiveDropdown} prefixId="fB"
                                    />
                                </div>
                                
                                <${DashboardView} 
                                    title="Hasil Kriteria B vs A" 
                                    kpis=${kpisB} 
                                    chartData=${chartDataB}
                                    barChartData=${barChartDataB}
                                    comparisonTargetKPIs=${kpisA}
                                    isComparing=${true} 
                                    filtersA=${filtersA} 
                                    filtersB=${filtersB}
                                    isDarkMode=${isDarkMode}
                                />

                                ${filtersB.kecamatan && html`
                                    <${DataTable} data=${filteredDataB} title=${`Daftar TPP - Kriteria B (${filtersB.kecamatan})`} />
                                `}
                            </div>
                        `}
                    </div>
                </div>
            `;
        };

        // Render aplikasi
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
